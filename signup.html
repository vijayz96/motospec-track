<!DOCTYPE html>
<html>
<head>

<title>Motospec Seller Signup</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
margin-top:100px;
}

input{
padding:10px;
margin:10px;
width:250px;
}

button{
padding:10px 20px;
background:#00ff99;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<h2>Create Seller Account</h2>

<input type="email" id="email" placeholder="Email"><br>
<input type="password" id="password" placeholder="Password"><br>

<button onclick="signupUser()">Create Account</button>

<br><br>

<a href="login.html" style="color:#00ff99;">Already have account? Login</a>


<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyCi0sodw0gRs0fNllMZbODIKpxxj4gwdos",
authDomain: "motospec-system.firebaseapp.com",
projectId: "motospec-system",
storageBucket: "motospec-system.firebasestorage.app",
messagingSenderId: "944522359083",
appId: "1:944522359083:web:65b0706d8aadd4a63f556e"
};

firebase.initializeApp(firebaseConfig);

function signupUser(){

var email=document.getElementById("email").value;
var password=document.getElementById("password").value;

firebase.auth().createUserWithEmailAndPassword(email,password)

.then(function(){

alert("Account created successfully");

window.location="login.html";

})

.catch(function(error){

alert(error.message);

});

}

</script>

</body>
</html>
