<!DOCTYPE html>
<html>
<head>
<title>Motospec Product Upload</title>

<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

input,textarea{

padding:10px;
margin:10px;
width:250px;
border-radius:5px;
border:none;

}

button{

padding:10px 20px;
background:#00ff99;
border:none;
border-radius:5px;
font-weight:bold;
cursor:pointer;

}

</style>
</head>

<body>

<h2>Upload Product</h2>

<input type="text" id="name" placeholder="Product Name"><br>

<textarea id="description" placeholder="Description"></textarea><br>

<input type="number" id="price" placeholder="Price"><br>

<input type="file" id="imageFile"><br>

<button onclick="submitProduct()">Upload</button>

<br><br>

<svg id="barcode"></svg>

<script>

if(localStorage.getItem("loggedIn")!="true"){
window.location="index.html";
}

async function submitProduct(){

const name=document.getElementById("name").value;

const description=document.getElementById("description").value;

const price=document.getElementById("price").value;

const file=document.getElementById("imageFile").files[0];

if(!file){

alert("Select image");

return;

}

const barcode="MOTO"+Date.now();

JsBarcode("#barcode",barcode,{
format:"CODE128",
displayValue:true
});

const formData=new FormData();

formData.append("file",file);

formData.append("upload_preset","techrome_upload");

const cloud=await fetch("https://api.cloudinary.com/v1_1/dly6ohy7j/image/upload",{

method:"POST",

body:formData

});

const data=await cloud.json();

const imageUrl=data.secure_url;

await fetch("https://hook.eu1.make.com/ec0zsxxpcfqjxb2wv23y3b674bso6red",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

name:name,

description:description,

price:price,

image:imageUrl,

barcode:barcode,

date:new Date().toLocaleString()

})

});

alert("Product Uploaded");

}

</script>

</body>
</html>
