<!DOCTYPE html>
<html>
<head>

<title>Motospec Product Upload</title>

<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:40px;
}

input, textarea{
width:260px;
padding:10px;
margin:10px;
border-radius:6px;
border:none;
}

button{
padding:12px 20px;
background:#00ff99;
border:none;
cursor:pointer;
margin:10px;
}

</style>

</head>

<body>

<h2>Motospec Product Upload</h2>

<input type="text" id="name" placeholder="Product Name"><br>

<textarea id="description" placeholder="Description"></textarea><br>

<input type="number" id="price" placeholder="Price"><br>

<input type="file" id="imageFile"><br>

<button onclick="submitProduct()">Upload Product</button>

<br><br>

<svg id="barcode"></svg>

<script>

// FIREBASE CONFIG

const firebaseConfig = {
apiKey: "AIzaSyCi0sodw0gRs0fNllMZbODIKpxxj4gwdos",
authDomain: "motospec-system.firebaseapp.com",
projectId: "motospec-system",
storageBucket: "motospec-system.firebasestorage.app",
messagingSenderId: "944522359083",
appId: "1:944522359083:web:65b0706d8aadd4a63f556e"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();


// CHECK LOGIN

firebase.auth().onAuthStateChanged(function(user){

if(!user){

alert("Please login first");

window.location="login.html";

}

});



// SUBMIT PRODUCT

async function submitProduct(){

const name = document.getElementById("name").value;
const description = document.getElementById("description").value;
const price = document.getElementById("price").value;
const file = document.getElementById("imageFile").files[0];

if(!file){

alert("Please select image");

return;

}


// GENERATE BARCODE

const barcodeValue = "MOTO" + Date.now();

JsBarcode("#barcode", barcodeValue, {
format:"CODE128",
displayValue:true
});


// UPLOAD IMAGE TO CLOUDINARY

const formData = new FormData();

formData.append("file", file);
formData.append("upload_preset", "techrome_upload");

const cloudinaryResponse = await fetch(

"https://api.cloudinary.com/v1_1/dly6ohy7j/image/upload",
{
method:"POST",
body:formData
}

);

const cloudinaryData = await cloudinaryResponse.json();

const imageUrl = cloudinaryData.secure_url;


// SAVE TO FIREBASE

const user = firebase.auth().currentUser;

await db.collection("products").add({

name:name,
description:description,
price:price,
image:imageUrl,
barcode:barcodeValue,
seller:user.email,
status:"pending",
date:new Date().toLocaleString()

});


// SEND TO GOOGLE SHEETS (MAKE WEBHOOK)

await fetch("https://hook.eu1.make.com/ec0zsxxpcfqjxb2wv23y3b674bso6red",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

name:name,
description:description,
price:price,
image:imageUrl,
barcode:barcodeValue,
date:new Date().toLocaleString()

})

});


alert("Product uploaded successfully!");

}

</script>

</body>
</html>
