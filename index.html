<!DOCTYPE html>
<html>
<head>
<title>Motospec Seller Login</title>

<style>
body{
font-family: Arial;
background:#0f0f0f;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:#1c1c1c;
padding:40px;
border-radius:10px;
text-align:center;
}

input{
padding:10px;
margin:10px;
width:220px;
border:none;
border-radius:5px;
}

button{
padding:10px 20px;
background:#00ff99;
border:none;
border-radius:5px;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<div class="login-box">

<h2>Motospec Seller</h2>

<input type="text" id="username" placeholder="User ID"><br>

<input type="password" id="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

</div>

<script>

const user="seller";
const pass="1234";

function login(){

let u=document.getElementById("username").value;
let p=document.getElementById("password").value;

if(u===user && p===pass){

localStorage.setItem("loggedIn","true");

window.location="dashboard.html";

}else{

alert("Wrong login");

}

}

</script>

</body>
</html>
