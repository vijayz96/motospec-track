<!DOCTYPE html>
<html>
<head>

<title>My Products</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

.product{
border:1px solid #444;
margin:20px;
padding:20px;
border-radius:8px;
}

img{
width:150px;
}

</style>

</head>

<body>

<h2>My Uploaded Products</h2>

<div id="products"></div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyCi0sodw0gRs0fNllMZbODIKpxxj4gwdos",
authDomain: "motospec-system.firebaseapp.com",
projectId: "motospec-system",
storageBucket: "motospec-system.firebasestorage.app",
messagingSenderId: "944522359083",
appId: "1:944522359083:web:65b0706d8aadd4a63f556e"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();


firebase.auth().onAuthStateChanged(function(user){

if(!user){

window.location="login.html";

return;

}

loadProducts(user.email);

});


function loadProducts(email){

db.collection("products")
.where("seller","==",email)
.get()
.then((querySnapshot)=>{

let html="";

querySnapshot.forEach((doc)=>{

const p=doc.data();

html+=`

<div class="product">

<img src="${p.image}"><br><br>

<b>${p.name}</b><br>

Price: ${p.price}<br>

Barcode: ${p.barcode}<br>

Status: ${p.status}<br>

</div>

`;

});

document.getElementById("products").innerHTML=html;

});

}

</script>

</body>
</html>
